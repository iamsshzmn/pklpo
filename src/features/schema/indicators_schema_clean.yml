# Единый реестр колонок для таблицы indicators
# ОЧИЩЕННАЯ ВЕРСИЯ без дублей, синонимов и неоднозначностей
# Это единственный источник истины для схемы БД

version: "2.1.0"
last_updated: "2025-10-25"

# Основные поля (PK и служебные)
primary_keys:
  - name: "symbol"
    type: "VARCHAR(20)"
    nullable: false
    description: "Trading symbol"

  - name: "timeframe"
    type: "VARCHAR(10)"
    nullable: false
    description: "Timeframe (1m, 5m, 1h, etc.)"

  - name: "timestamp"
    type: "BIGINT"
    nullable: false
    description: "Timestamp in milliseconds"

# Служебные поля
service_fields:
  - name: "calculated_at"
    type: "TIMESTAMP"
    nullable: true
    description: "Calculation timestamp"

  - name: "run_id"
    type: "VARCHAR(36)"
    nullable: true
    description: "Airflow run ID"

  - name: "params_hash"
    type: "VARCHAR(16)"
    nullable: true
    description: "Parameters hash"

  - name: "data_quality_status"
    type: "VARCHAR(20)"
    nullable: true
    default: "good"
    description: "Data quality status"

  - name: "nan_count"
    type: "INTEGER"
    nullable: true
    default: 0
    description: "Number of NaN values"

  - name: "valid_rate"
    type: "DOUBLE PRECISION"
    nullable: true
    default: 1.0
    description: "Valid data rate (0.0-1.0)"

  - name: "schema_version"
    type: "VARCHAR(10)"
    nullable: true
    default: "v2.1"
    description: "Schema version"

  - name: "algo_version"
    type: "VARCHAR(20)"
    nullable: true
    default: "2.1.0"
    description: "Algorithm version"

  - name: "created_at"
    type: "TIMESTAMP"
    nullable: true
    default_sql: "CURRENT_TIMESTAMP"
    description: "Record creation time"

  - name: "updated_at"
    type: "TIMESTAMP"
    nullable: true
    default_sql: "CURRENT_TIMESTAMP"
    description: "Record update time"

