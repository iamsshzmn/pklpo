  # Performance алиасы
  "var_20": "value_at_risk_20"

  # Промежуточные (удалены из схемы)
  "hl2": null  # Исключен
  "midpoint": null  # Исключен
  "midprice": null  # Исключен

# Regex правила для автоматического маппинга
regex_mapping:
  - pattern: "^ema(\\d+)$"
    replacement: "ema_$1"
    description: "EMA period mapping"

  - pattern: "^sma(\\d+)$"
    replacement: "sma_$1"
    description: "SMA period mapping"

  - pattern: "^bbands_(.*)$"
    replacement: "bb_$1"
    description: "Bollinger Bands mapping"

# Валидация
validation:
  required_fields: ["symbol", "timeframe", "timestamp", "calculated_at"]
  max_string_length: 50
  max_decimal_precision: 20
  max_decimal_scale: 8

  # Контракт типов
  type_contract:
    numeric_values: "DOUBLE PRECISION"
    boolean_flags: "BOOLEAN"
    direction_signals: "SMALLINT"
    candlestick_patterns: "SMALLINT"

  # Семантика NaN/inf
  nan_handling: "CONVERT_TO_NULL"

  # Шкала процентов
  percent_scale: "0.0-1.0"

  # Индексы для производительности
  recommended_indexes:
    - ["symbol", "timeframe", "timestamp"]
    - ["run_id"]
    - ["calculated_at"]
    - ["timeframe", "calculated_at"]
