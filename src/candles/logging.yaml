# Конфигурация логирования для модуля market_meta

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s | %(name)s | %(levelname)s | %(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  json:
    format: '{"timestamp": "%(asctime)s", "logger": "%(name)s", "level": "%(levelname)s", "message": "%(message)s"}'
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/market_meta.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/market_meta_errors.log
    maxBytes: 10485760  # 10 MB
    backupCount: 3
    encoding: utf8

loggers:
  market_meta:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  market_meta.api:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  market_meta.validators:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  market_meta.okx_integration:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

  market_meta.risk_limits:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
