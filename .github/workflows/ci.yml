name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on new push to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Note on TA-Lib: TA-Lib==0.6.8 ships pre-built wheels, no C library needed.
# FEATURES_TA_BACKEND=pandas_ta is set globally so compute-heavy TA paths are
# skipped in the core gate jobs (same behaviour as `make test`).
# ---------------------------------------------------------------------------
env:
  FEATURES_TA_BACKEND: pandas_ta

jobs:
  # ---------------------------------------------------------------------------
  # Guard: immutable migration files — runs only on PRs
  # ---------------------------------------------------------------------------
  migration-guard:
    name: Migration immutability guard
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject modifications to existing migration files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          CHANGED="$(git diff --name-status "${BASE_SHA}" "${{ github.sha }}" \
            -- src/market_selection/migrations/*.sql \
               src/candles/migrations/*.sql \
               src/*/migrations/*.sql \
               src/db/migrations/*.py 2>/dev/null || true)"
          # One-time allowlist: mechanically split into per-statement execution
          # (asyncpg single-statement constraint) before the .py guard existed.
          # Do NOT extend this list — add a new migration file instead.
          ALLOWLIST='src/db/migrations/migrate_create_ops_feature_eligibility.py
          src/db/migrations/migrate_create_ops_feature_eligibility_transitions.py
          src/db/migrations/migrate_drop_redundant_swap_ohlcv_indexes.py'
          for f in ${ALLOWLIST}; do
            CHANGED="$(echo "${CHANGED}" | grep -v "	${f}$" || true)"
          done
          if [ -z "${CHANGED}" ]; then
            echo "No migration changes."
            exit 0
          fi
          echo "Changed migration files:"
          echo "${CHANGED}"
          if echo "${CHANGED}" | grep -E '^(M|D|R|C|T|U)'; then
            echo "ERROR: Existing migration files are immutable — add a new file instead."
            exit 1
          fi
          echo "Only new migration files — OK."

  # ---------------------------------------------------------------------------
  # 1. Lint: ruff check + format (no heavy deps, ~10 s)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff==0.15.1"

      - name: ruff check src/ tests/
        run: ruff check src/ tests/

      - name: ruff format --check src/ tests/
        run: >
          ruff format --check src/ tests/
          --exclude src/db/migrations/migrate_add_operational_reliability.py
          --exclude src/db/migrations/migrate_backfill_partitioned.py
          --exclude src/db/migrations/migrate_phase3_quant_tables.py
          --exclude src/db/migrations/migrate_validate_swap_ohlcv_constraints.py

  # ---------------------------------------------------------------------------
  # 2. Type check: mypy — non-blocking until Phase B cleans up types (ROADMAP)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: mypy src/
        # Non-blocking: type errors tracked but do not block merge (ROADMAP A8).
        # Remove continue-on-error when mypy src/ is clean (target: Phase B).
        run: mypy src/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # 3. Tests (fast): all except slow + integration — no coverage threshold
  # ---------------------------------------------------------------------------
  test-fast:
    name: Tests (fast)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest — fast markers
        # --override-ini addopts="" strips --cov-fail-under=85 from pyproject.toml
        env:
          ENVIRONMENT: test
          POSTGRES_USER: pklpo_ci
          POSTGRES_PASSWORD: ci_dummy
          POSTGRES_DB: pklpo_ci
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          pytest \
            -m "not slow and not integration" \
            --override-ini addopts="" \
            -q --tb=short

  # ---------------------------------------------------------------------------
  # 4. Look-ahead gate — data-leakage guard, MUST stay green
  # ---------------------------------------------------------------------------
  lookahead:
    name: Look-ahead gate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest — lookahead marker
        env:
          ENVIRONMENT: test
          POSTGRES_USER: pklpo_ci
          POSTGRES_PASSWORD: ci_dummy
          POSTGRES_DB: pklpo_ci
          DB_HOST: localhost
          DB_PORT: "5432"
        run: |
          pytest \
            -m lookahead \
            --override-ini addopts="" \
            -q --tb=short

  # ---------------------------------------------------------------------------
  # 5. Smoke import — CLI loads + prints help without a live DB
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke import
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: CLI --help (no DB required)
        env:
          ENVIRONMENT: test
          POSTGRES_USER: pklpo_ci
          POSTGRES_PASSWORD: ci_dummy
          POSTGRES_DB: pklpo_ci
          DB_HOST: localhost
          DB_PORT: "5432"
        run: python -m src.cli.main --help

  # ---------------------------------------------------------------------------
  # 6. Candles DoD gate — runs after core gate passes
  # ---------------------------------------------------------------------------
  candles-dod:
    name: Candles DoD gate
    runs-on: ubuntu-22.04
    needs: [lint, test-fast, lookahead, smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Candles DoD
        run: python scripts/run_candles_dod.py --cov-fail-under=50

  # ---------------------------------------------------------------------------
  # 7. Performance benchmarks — non-blocking, runs after core gate
  # ---------------------------------------------------------------------------
  performance:
    name: Performance benchmarks
    runs-on: ubuntu-22.04
    needs: [lint, test-fast, lookahead, smoke]
    # Non-blocking: benchmark regressions are informational, not merge blockers
    continue-on-error: true
    env:
      FEATURES_BENCH_ROWS: "10000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest-benchmark
        run: |
          pytest \
            tests/features/benchmarks/bench_pipeline.py \
            -q --benchmark-json=benchmarks/results/pytest_benchmark.json \
            --override-ini addopts=""

      - name: Group performance benchmark
        run: python scripts/run_features_group_benchmark.py

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: features-group-benchmark
          path: |
            benchmarks/results/group_baseline_*.json
            benchmarks/results/pytest_benchmark.json
          if-no-files-found: warn
