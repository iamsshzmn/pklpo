# MTF Phase 3 Production Configuration
# Продакшн конфигурация с оптимизированными настройками

# Context Builder Configuration (Production)
context:
  timeframes: ["1Mutc", "1Wutc", "1Dutc", "4H", "1H"]
  validity_thresholds:
    "1Mutc": 0.45
    "1Wutc": 0.4
    "1Dutc": 0.35
    "4H": 0.35
    "1H": 0.3
  trend_weights:
    ema_trend: 0.4
    adx_strength: 0.25
    rsi_momentum: 0.15
    macd_signal: 0.1
    volume_confirmation: 0.1
  regime_thresholds:
    trend_min_score: 0.35
    range_max_score: 0.25
    bull_min_score: 0.15
    bear_max_score: -0.15
  validation_settings:
    min_data_points: 100
    max_missing_ratio: 0.05
    outlier_threshold: 2.5

# Triggers Builder Configuration (Production)
triggers:
  timeframes: ["15m", "5m", "1m"]
  reversal_weights:
    "15m":
      rsi: 0.25
      macd: 0.25
      bollinger: 0.2
      stochastic: 0.15
      volume: 0.1
      momentum: 0.05
    "5m":
      rsi: 0.3
      macd: 0.2
      bollinger: 0.25
      stochastic: 0.15
      volume: 0.05
      momentum: 0.05
    "1m":
      rsi: 0.35
      macd: 0.15
      bollinger: 0.3
      stochastic: 0.1
      volume: 0.05
      momentum: 0.05
  noise_filter_thresholds:
    "15m":
      min_volume_ratio: 0.9
      max_atr_ratio: 1.8
      min_adx: 18
      cluster_confirmation: 3
    "5m":
      min_volume_ratio: 0.8
      max_atr_ratio: 2.2
      min_adx: 15
      cluster_confirmation: 3
    "1m":
      min_volume_ratio: 0.7
      max_atr_ratio: 2.8
      min_adx: 12
      cluster_confirmation: 4
  micro_filter_settings:
    liquidity_threshold: 0.6
    spread_threshold: 0.0008
    volume_threshold: 0.4
    volatility_threshold: 0.015
  cluster_confirmation_settings:
    min_cluster_size: 3
    max_cluster_gap: 2
    consistency_threshold: 0.7
  validation_settings:
    min_data_points: 50
    max_missing_ratio: 0.1
    probability_bounds: [0.0, 1.0]
    acceleration_bounds: [-1, 1]

# Consensus Builder Configuration (Production)
consensus:
  horizons: ["intraday", "swing", "week"]
  horizon_weights:
    intraday:
      "1Dutc": 0.4
      "4H": 0.3
      "1H": 0.2
      "15m": 0.1
    swing:
      "1Dutc": 0.5
      "4H": 0.3
      "1Wutc": 0.2
    week:
      "1Dutc": 0.4
      "1Wutc": 0.3
      "1Mutc": 0.3
  decision_thresholds:
    intraday:
      context_min: 0.2
      trigger_p_min: 0.6
      consensus_min: 0.65
      veto_threshold: 0.25
    swing:
      context_min: 0.25
      trigger_p_min: 0.65
      consensus_min: 0.7
      veto_threshold: 0.2
    week:
      context_min: 0.3
      trigger_p_min: 0.7
      consensus_min: 0.75
      veto_threshold: 0.15
  score_weights:
    context: 0.35
    trigger: 0.35
    consensus: 0.15
    quality: 0.1
    momentum: 0.05
  veto_settings:
    micro_filter_veto: true
    context_conflict_threshold: 0.35
    trigger_conflict_threshold: 0.25
    threshold_veto_enabled: true
    veto_override_threshold: 0.85
  validation_settings:
    min_context_timeframes: 3
    min_trigger_timeframes: 2
    max_disagreement_threshold: 0.4
    min_coverage_threshold: 0.7
    score_bounds: [0.0, 1.0]
    confidence_bounds: [0.0, 1.0]

# Pipeline Orchestrator Configuration (Production)
pipeline:
  context_timeframes: ["1Mutc", "1Wutc", "1Dutc", "4H", "1H"]
  trigger_timeframes: ["15m", "5m", "1m"]
  consensus_horizons: ["intraday", "swing", "week"]
  max_retries: 5
  retry_delay_seconds: 2.0
  timeout_seconds: 600.0
  parallel_processing: true
  max_workers: 8
  enable_monitoring: true
  enable_metrics: true
  performance_settings:
    memory_limit_mb: 2048
    cpu_limit_percent: 90
    disk_space_limit_mb: 20000
    network_timeout_seconds: 60

# Integration Module Configuration (Production)
integration:
  features_settings:
    enabled: true
    module_path: "src.features.core"
    function_name: "compute_features"
    default_specs:
      - "ema_21"
      - "ema_55"
      - "adx_14"
      - "atr_14"
      - "sma_50"
      - "sma_200"
      - "rsi_14"
      - "macd"
      - "macd_signal"
      - "bb_upper"
      - "bb_lower"
      - "stoch_k"
      - "stoch_d"
      - "volume"
      - "obv"
      - "cmf"
    volatility_normalize: true
  market_meta_settings:
    enabled: true
    module_path: "src.market_meta.api"
    function_name: "get_market_metadata"
    cache_duration_seconds: 180
    validate_orders: true
    check_risk_limits: true
    liquidity_check: true
  database_settings:
    enabled: true
    connection_string: "postgresql://user:pass@prod-db:5432/mtf_prod"
    pool_size: 20
    max_overflow: 40
    pool_timeout: 60
    pool_recycle: 1800
    echo: false
  timeout_settings:
    features_timeout: 60.0
    market_meta_timeout: 15.0
    database_timeout: 30.0
    external_api_timeout: 30.0
  retry_settings:
    max_retries: 5
    retry_delay: 2.0
    backoff_factor: 1.5
    retry_on_timeout: true
    retry_on_connection_error: true
  data_quality_settings:
    min_completeness: 0.9
    max_age_minutes: 15
    outlier_threshold: 2.5
    missing_data_threshold: 0.05
    validate_ohlcv_logic: true
    check_data_freshness: true
  cache_settings:
    enabled: true
    cache_size_mb: 500
    default_ttl_seconds: 180
    features_cache_ttl: 300
    market_meta_cache_ttl: 180
    database_cache_ttl: 900

# Global Settings (Production)
global:
  environment: "production"
  log_level: "WARNING"
  enable_debug: false
  enable_profiling: true
  timezone: "UTC"
  date_format: "%Y-%m-%d %H:%M:%S"

# Monitoring Settings (Production)
monitoring:
  enable_metrics: true
  metrics_interval_seconds: 30
  enable_alerts: true
  alert_thresholds:
    error_rate: 0.05
    response_time_ms: 3000
    memory_usage_percent: 85
    cpu_usage_percent: 85
  health_check_interval_seconds: 15

# Security Settings (Production)
security:
  enable_encryption: true
  encryption_key: "${ENCRYPTION_KEY}"  # Из переменных окружения
  enable_audit_log: true
  max_request_size_mb: 5
  rate_limit_requests_per_minute: 200
