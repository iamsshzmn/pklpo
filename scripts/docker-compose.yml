services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: pklpo_app
    working_dir: /workspace
    command: ["sleep", "infinity"]
    volumes:
      - ..:/workspace
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_started
    networks:
      - pklpo_network

  db:
    image: postgres:16.3
    container_name: pklpo_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pklpo}
      POSTGRES_USER: ${POSTGRES_USER:-pklpo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - pklpo_network

  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: pklpo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - pklpo_network

  metabase:
    image: metabase/metabase:v0.57.6.x
    container_name: pklpo_metabase
    restart: always
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-pklpo_user}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-strongpassword}
      MB_DB_HOST: db
      MB_ENCRYPTION_SECRET_KEY: ${MB_ENCRYPTION_SECRET_KEY:-your-secret-key-here}
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - db
    networks:
      - pklpo_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  pgadmin_data:
  metabase_data:

networks:
  pklpo_network:
    name: pklpo_network
