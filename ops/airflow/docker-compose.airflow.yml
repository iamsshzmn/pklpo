name: pklpo-airflow

networks:
  pklpo_network:
    external: true
    name: pklpo_pklpo_network

x-environment: &airflow_env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY:-81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs=}'
  AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW_SECRET_KEY:-a25dhjGbaNdj7ZOnasb8aZeD4nk5d7jw}'
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@${AIRFLOW_DB_HOST:-postgres}:${AIRFLOW_DB_PORT:-5432}/${AIRFLOW_DB_NAME:-airflow_db}
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'false'
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://pklpo_user:strongpassword@pklpo_db:5432/pklpo}
  OBSERVABILITY_PROMETHEUS_ENABLED: ${OBSERVABILITY_PROMETHEUS_ENABLED:-false}
  OBSERVABILITY_PROMETHEUS_PUSHGATEWAY_URL: ${OBSERVABILITY_PROMETHEUS_PUSHGATEWAY_URL:-http://pushgateway:9091}
  OBSERVABILITY_JOB_NAME: ${OBSERVABILITY_JOB_NAME:-features_pipeline}
  OBSERVABILITY_METRICS_PREFIX: ${OBSERVABILITY_METRICS_PREFIX:-pklpo}

services:
  postgres:
    image: postgres:15.7-alpine3.20
    container_name: pklpo-airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow_db}
    ports:
      - "5433:5432"
    volumes:
      - af_pg_data:/var/lib/postgresql/data
    networks:
      - pklpo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always

  airflow-init:
    build:
      context: ../../
      dockerfile: ops/airflow/Dockerfile.airflow
    environment:
      <<: *airflow_env
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    entrypoint: ["bash", "-c", "airflow db init && airflow users create --username admin --firstname Air --lastname Flow --role Admin --email admin@example.com --password $${AIRFLOW_ADMIN_PASSWORD}"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pklpo_network

  airflow-webserver:
    build:
      context: ../../
      dockerfile: ops/airflow/Dockerfile.airflow
    environment:
      <<: *airflow_env
      PYTHONPATH: /opt/airflow/project
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pklpo_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync
          path: ../../src
          target: /opt/airflow/project/src
        - action: sync
          path: ./dags
          target: /opt/airflow/dags
        - action: rebuild
          path: ./Dockerfile.airflow
        - action: rebuild
          path: ./requirements-airflow.txt
    restart: always

  airflow-scheduler:
    build:
      context: ../../
      dockerfile: ops/airflow/Dockerfile.airflow
    environment:
      <<: *airflow_env
      PYTHONPATH: /opt/airflow/project
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pklpo_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync
          path: ../../src
          target: /opt/airflow/project/src
        - action: sync
          path: ./dags
          target: /opt/airflow/dags
        - action: rebuild
          path: ./Dockerfile.airflow
        - action: rebuild
          path: ./requirements-airflow.txt
    restart: always

volumes:
  af_pg_data:
    name: pklpo-airflow-pg-data
