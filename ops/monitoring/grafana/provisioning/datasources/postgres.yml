apiVersion: 1

datasources:
  - name: PostgresPKLPO
    uid: PostgresPKLPO
    type: postgres
    access: proxy
    url: ${GRAFANA_PG_HOST}:${GRAFANA_PG_PORT}
    user: ${GRAFANA_PG_USER}
    secureJsonData:
      password: ${GRAFANA_PG_PASSWORD}
    jsonData:
      database: ${GRAFANA_PG_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
