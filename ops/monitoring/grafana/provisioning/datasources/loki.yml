apiVersion: 1

datasources:
  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: run_id
          matcherRegex: '"run_id"\s*:\s*"([^"]+)"'
          url: ''
          datasourceUid: ''
        - name: trace_id
          matcherRegex: '"trace_id"\s*:\s*"([0-9a-f]{32})"'
          url: '$${__value.raw}'
          datasourceUid: Tempo
    version: 3
    editable: false
